# Nginx configuration for aztec-pay.xyz production deployment
# Copy this file to /etc/nginx/sites-available/aztec-pay on your server
# Then run: sudo ln -s /etc/nginx/sites-available/aztec-pay /etc/nginx/sites-enabled/

# Rate limiting zone (150 req/min = 2.5 req/sec)
limit_req_zone $binary_remote_addr zone=aztec_limit:10m rate=150r/m;

# Frontend: aztec-pay.xyz
server {
    listen 80;
    server_name aztec-pay.xyz www.aztec-pay.xyz;

    location / {
        limit_req zone=aztec_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Aztec WASM
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}

# Backend API: api.aztec-pay.xyz
server {
    listen 80;
    server_name api.aztec-pay.xyz;

    location / {
        limit_req zone=aztec_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# Aztec Node: aztec-node.aztec-pay.xyz
server {
    listen 80;
    server_name aztec-node.aztec-pay.xyz;

    location / {
        limit_req zone=aztec_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
